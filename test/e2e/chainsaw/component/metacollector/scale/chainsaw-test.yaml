# Test: Component scale — create with replicas=2, scale down to 1.
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: metacollector-scale
spec:
  description: "Component (metacollector) scale: create replicas=2 → scale down to 1"
  bindings:
    - name: component_name
      value: mc-scale
    - name: component_type
      value: metacollector
    - name: component_replicas
      value: 2
  steps:
    # --- component-create-scaled ---
    - name: Create Component with replicas=2
      use:
        template: ../../../common/_step_templates/apply-assert-component.yaml
    - name: Assert Component status with 2 replicas
      use:
        template: ../../../common/_step_templates/assert-component-status.yaml
      bindings:
        - name: expected_reconciled
          value: "True"
        - name: expected_available
          value: "True"
        - name: expected_replicas
          value: 2
        - name: expected_version
          value: "0.1.2"
    # --- component-scale-down ---
    - name: Scale down to 1 replica
      try:
        - patch:
            resource:
              apiVersion: instance.falcosecurity.dev/v1alpha1
              kind: Component
              metadata:
                name: ($component_name)
              spec:
                replicas: 1
        - assert:
            resource:
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: ($component_name)
              spec:
                replicas: 1
              status:
                availableReplicas: 1
                readyReplicas: 1
    - name: Assert Component status after scale down
      use:
        template: ../../../common/_step_templates/assert-component-status.yaml
      bindings:
        - name: expected_reconciled
          value: "True"
        - name: expected_available
          value: "True"
        - name: expected_replicas
          value: 1
        - name: expected_version
          value: "0.1.2"
