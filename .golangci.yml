version: "2"
run:
  timeout: 10m
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - asciicheck
    - asasalint
    - bidichk
    - bodyclose
    - containedctx
    - copyloopvar
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - ginkgolinter
    - goconst
    - gocritic
    - gocyclo
    - godot
    - goheader
    - gomodguard
    - goprintffuncname
    - gosec
    - govet
    - importas
    - ineffassign
    - intrange
    - lll
    - misspell
    - modernize
    - nakedret
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - promlinter
    - reassign
    - revive
    - rowserrcheck
    - staticcheck
    - testifylint
    - unconvert
    - unparam
    - unused
    - usetesting
    - wastedassign
    - whitespace
  settings:
    dupl:
      threshold: 300
    exhaustive:
      default-signifies-exhaustive: true
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    goheader:
      values:
        const:
          AUTHORS: The Falco Authors
      template: |-
        Copyright (C) {{ YEAR }} {{ AUTHORS }}

        Licensed under the Apache License, Version 2.0 (the "License");
        you may not use this file except in compliance with the License.
        You may obtain a copy of the License at

            http://www.apache.org/licenses/LICENSE-2.0

        Unless required by applicable law or agreed to in writing, software
        distributed under the License is distributed on an "AS IS" BASIS,
        WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        See the License for the specific language governing permissions and
        limitations under the License.

        SPDX-License-Identifier: Apache-2.0
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    importas:
      alias:
        - pkg: k8s.io/api/([a-z]+)/(v[\w\d]+)
          alias: ${1}${2}
        - pkg: k8s.io/apimachinery/pkg/apis/meta/v1
          alias: metav1
        - pkg: k8s.io/apimachinery/pkg/api/errors
          alias: k8serrors
        - pkg: sigs.k8s.io/controller-runtime/pkg/log
          alias: ctrllog
    lll:
      line-length: 150
    misspell:
      locale: US
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
    revive:
      rules:
        - name: dot-imports
          disabled: true
        - name: errorf
          severity: warning
          disabled: false
        - name: error-strings
          severity: warning
          disabled: false
        - name: error-naming
          severity: warning
          disabled: false
        - name: empty-block
          severity: warning
          disabled: false
        - name: optimize-operands-order
        - name: identical-branches
        - name: comment-spacings
        - name: package-comments
        - name: range
        - name: range-val-address
        - name: receiver-naming
        - name: range-val-in-closure
        - name: superfluous-else
        - name: unhandled-error
        - name: exported
          arguments:
            - disableStutteringCheck
    testifylint:
      enable-all: true
      disable:
        - require-error
    usetesting:
      os-temp-dir: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
        text: Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*printf?|os\.(Un)?Setenv). is not checked
      - linters:
          - lll
        path: api/*
      - linters:
          - dupl
          - lll
        path: internal/*
      - linters:
          - govet
        text: declaration of "(err|ctx)" shadows declaration at
      - linters:
          - errorlint
        text: type switch on error will fail on wrapped errors. Use errors.As to check for specific errors
      - linters:
          - gosec
        path: _test\.go
      - linters:
          - gocyclo
        path: main.go
      - linters:
          - whitespace
        path: _test\.go
      - linters:
          - noctx
        path: test/
      - linters:
          - revive
        path: internal/|test/
        text: 'exported: exported'
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gci
    - gofmt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/falcosecurity/falco-operator)
      custom-order: true
    goimports:
      local-prefixes:
        - github.com/falcosecurity/falco-operator
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  fix: true
  max-issues-per-linter: 0
  max-same-issues: 0
