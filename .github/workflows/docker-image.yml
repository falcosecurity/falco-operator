name: Docker Image

on:
  workflow_call:
    inputs:
      component_name:
        description: "The name of the component being built"
        required: true
        type: string
      release:
        description: "The release version to use for tagging the image"
        required: true
        type: string
      commit:
        description: "The Git commit hash used for the build"
        required: true
        type: string
      build_date:
        description: "The date when the build is performed"
        required: true
        type: string
      image_name:
        description: "The Docker image name and path to push to registry"
        required: true
        type: string
      sign:
        description: "Whether to sign the Docker image with Cosign"
        required: false
        default: false
        type: boolean
      artifact_operator_image:
        description: "The artifact-operator image to inject as sidecar (only for instance-operator)"
        required: false
        default: ""
        type: string
    outputs:
      digest:
        description: The digest of the pushed image.
        value: ${{ jobs.docker-image.outputs.digest }}

jobs:
  load-matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - id: read
        run: echo "matrix=$(jq -c . .github/build-matrix.json)" >> $GITHUB_OUTPUT

  build-binaries:
    runs-on: ubuntu-22.04
    needs: load-matrix
    strategy:
      matrix: ${{ fromJson(needs.load-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: "go.mod"
          check-latest: true

      - name: Validate inputs
        run: |
          test -n "${{ inputs.release }}" || { echo "The release input is unset. Aborting"; exit 1; }
          test -n "${{ inputs.commit }}" || { echo "The commit input is unset. Aborting"; exit 1; }
          test -n "${{ inputs.build_date }}" || { echo "The build_date input is unset. Aborting"; exit 1; }
          test -n "${{ inputs.component_name }}" || { echo "The component_name input is unset. Aborting"; exit 1; }

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          PROJECT: github.com/falcosecurity/falco-operator
        run: |
          go build -ldflags \
            "-s -w \
            -X '${PROJECT}/internal/pkg/version.SemVersion=${{ inputs.release }}' \
            -X '${PROJECT}/internal/pkg/version.GitCommit=${{ inputs.commit }}' \
            -X '${PROJECT}/internal/pkg/version.BuildDate=${{ inputs.build_date }}' \
            -X '${PROJECT}/internal/pkg/version.ArtifactOperatorImage=${{ inputs.artifact_operator_image }}'" \
            -o bin/${{ matrix.os }}/${{ matrix.arch }}/${{ inputs.component_name }} \
            ./cmd/${{ inputs.component_name }}/main.go

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.component_name }}-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/${{ matrix.os }}/${{ matrix.arch }}/${{ inputs.component_name }}
          retention-days: 1

  docker-image:
    runs-on: ubuntu-22.04
    needs: build-binaries
    outputs:
      image: ${{ steps.build-and-push.outputs.image }}
      digest: ${{ steps.build-and-push.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set platforms
        id: platforms
        run: echo "value=$(jq -r '[.include[]|"\(.os)/\(.arch)"]|join(",")' .github/build-matrix.json)" >> $GITHUB_OUTPUT

      - name: Download amd64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.component_name }}-linux-amd64
          path: bin/linux/amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.component_name }}-linux-arm64
          path: bin/linux/arm64

      - name: Prepare binaries
        run: |
          mv bin/linux/amd64/${{ inputs.component_name }} bin/linux/amd64/manager
          mv bin/linux/arm64/${{ inputs.component_name }} bin/linux/arm64/manager
          chmod +x bin/linux/amd64/manager bin/linux/arm64/manager

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        id: Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_SECRET }}

      - name: Docker Meta
        id: meta_image
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ inputs.image_name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{ version }}
            type=semver,pattern={{ major }}
            type=semver,pattern={{ major }}.{{ minor }}

      - name: Build and push
        id: build-and-push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          tags: ${{ steps.meta_image.outputs.tags }}
          file: ./build/Dockerfile

      - name: Install Cosign
        if: ${{ inputs.sign }}
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign the images with GitHub OIDC Token
        if: ${{ inputs.sign }}
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ steps.meta_image.outputs.tags }}
          COSIGN_YES: "true"
        run: echo "${TAGS}" | xargs -I {} cosign sign {}@${DIGEST}
